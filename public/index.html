<!doctype html><html><head><meta charset='UTF-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/><title>OpenClaw Trading Control UI</title><style>body{margin:0;background:#061006;color:#22ff77;font-family:Inter,Arial}.w{max-width:1200px;margin:16px auto;padding:0 12px}.c{border:1px solid #1f4f1f;background:#0b160b;border-radius:12px;padding:12px}.g{display:grid;grid-template-columns:1.6fr 1fr;gap:12px}.k{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.b{padding:8px 10px;background:#0f290f;color:#22ff77;border:1px solid #2a6f2a;border-radius:8px;cursor:pointer}.log,.chat{height:220px;overflow:auto;background:#030803;border:1px solid #1f4f1f;border-radius:8px;padding:8px}.mut{color:#9ccc9c;font-size:12px}canvas{width:100%;height:220px;background:#030803;border:1px solid #1f4f1f;border-radius:8px}</style></head><body><div class='w'><div class='c'><b>OPENCLAW // TRADING CONTROL UI</b> <span id='status'></span></div><div class='g' style='margin-top:10px'><div class='c'><div class='k'><div><div class='mut'>Stock Move ($)</div><div id='session'></div></div><div><div class='mut'>Stock Move (%)</div><div id='daily'></div></div><div><div class='mut'>Symbol</div><div id='symbol'></div></div><div><div class='mut'>Price</div><div id='price'></div></div></div><div style='margin:8px 0;display:flex;gap:8px;flex-wrap:wrap'><button class='b' onclick='startBot()'>Start Hours Mode</button><button class='b' onclick='stopBot()'>Pause Bot</button><button class='b' onclick='connectBridge()'>Connect Replay Bridge</button></div><canvas id='chart' width='800' height='220'></canvas><h4>Activity</h4><div class='log' id='activity'></div></div><div class='c'><h4>Chat</h4><div class='chat' id='chat'></div><div style='display:flex;gap:8px;margin-top:8px'><input id='chatInput' style='flex:1;background:#041004;color:#22ff77;border:1px solid #1f4f1f;border-radius:8px;padding:8px' placeholder='Ask with live data...'><button class='b' onclick='mic()'>🎙️</button><button class='b' onclick='sendChat()'>Send</button></div><div class='mut' style='margin-top:8px'>Bridge: Dashboard ← replay.tradingterminal.com (real tab)</div></div></div></div><script>let st=null,last='';const ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host);ws.onmessage=e=>{const m=JSON.parse(e.data);if(m.type==='state')render(m.state)};async function boot(){render(await (await fetch('/api/state')).json())}function fmt(n){return '$'+Number(n||0).toFixed(2)}function render(s){st=s;const c=s.market.candles||[];const base=(c.length?(c[0].c??c[0].close):s.market.price)||s.market.price;const move=(s.market.price-base);session.textContent=fmt(move);daily.textContent=(Number(s.market.changePct||0).toFixed(2)+'%');symbol.textContent=s.market.symbol;price.textContent=fmt(s.market.price);status.textContent=` | ${new Date().toLocaleString('en-US',{timeZone:s.timezone})} | Bridge:${s.bridge.connected?'ON':'OFF'} | Bot:${s.bot.running?'RUNNING':'PAUSED'}`;activity.innerHTML=s.activity.map(a=>`<div>[${new Date(a.t).toLocaleTimeString()}] ${a.msg}</div>`).join('');chat.innerHTML=s.chat.map(c=>`<div><b>${c.role==='user'?'You':'Frank'}:</b> ${c.message}</div>`).join('');draw(c);}function draw(c){const cv=document.getElementById('chart'),x=cv.getContext('2d');x.clearRect(0,0,cv.width,cv.height);x.strokeStyle='#1f4f1f';x.strokeRect(0,0,cv.width,cv.height);if(c.length<2)return;const vals=[];for(const b of c){vals.push(b.h??b.c??b.close);vals.push(b.l??b.c??b.close);}const min=Math.min(...vals),max=Math.max(...vals);const step=cv.width/Math.max(c.length,1);const w=Math.max(4,step*0.9);c.forEach((b,i)=>{const o=b.o??b.c??b.close,h=b.h??b.c??b.close,l=b.l??b.c??b.close,cl=b.c??b.close;const xx=(i+0.5)*step;const y=(v)=>cv.height-((v-min)/((max-min)||1))*cv.height;const yo=y(o),yc=y(cl),yh=y(h),yl=y(l);x.strokeStyle='#22ff77';x.beginPath();x.moveTo(xx,yh);x.lineTo(xx,yl);x.stroke();const top=Math.min(yo,yc),bot=Math.max(yo,yc),hh=Math.max(1,bot-top);if(cl>=o){x.fillStyle='#061006';x.strokeStyle='#22ff77';x.strokeRect(xx-w/2,top,w,hh);}else{x.fillStyle='#22ff77';x.fillRect(xx-w/2,top,w,hh);}});}
async function startBot(){await fetch('/api/bot/start',{method:'POST'})}
async function stopBot(){await fetch('/api/bot/stop',{method:'POST'})}
async function sendChat(){const m=chatInput.value.trim();if(!m)return;chatInput.value='';await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:m})})}
function mic(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return alert('SpeechRecognition not supported');const r=new SR();r.onresult=e=>chatInput.value=e.results[0][0].transcript;r.start();}
async function connectBridge(){const js=await (await fetch('/api/bridge/inject.js')).text();try{if(navigator.clipboard&&navigator.clipboard.writeText){await navigator.clipboard.writeText(js);alert('Bridge script copied. In replay.tradingterminal.com tab: open DevTools console, paste, Enter.');return;}}catch(e){}window.prompt('Copy this bridge script, then paste it in replay.tradingterminal.com DevTools Console and press Enter:',js);}
boot();</script></body></html>
